# DualGuard Configuration File

app:
  name: "Wikipedia"
  package: "org.wikipedia"
  apk_path: "apps/wikipedia.apk"

browserstack:
  username: "YOUR_BROWSERSTACK_USERNAME"
  access_key: "YOUR_BROWSERSTACK_ACCESS_KEY"
  app_url: "YOUR_APP_URL_AFTER_UPLOAD"

devices:
  english:
    device: "Samsung Galaxy S22"
    os_version: "12.0"
    locale: "en_US"
    language: "en"
  arabic:
    device: "Samsung Galaxy S22"
    os_version: "12.0"
    locale: "ar_AE"
    language: "ar"

test:
  timeout: 30
  screenshot_dir: "reports/screenshots"
  diff_dir: "reports/diffs"
  visual_threshold: 40

reporting:
  allure_dir: "reports/allure-results"